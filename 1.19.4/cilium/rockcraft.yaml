name: cilium
summary: Cilium agent rock for the Cilium CNI.
description: This rock is a drop in replacement for the cilium/cilium image.
version: "1.19.4"
license: Apache-2.0

base: ubuntu@22.04
build-base: ubuntu@22.04
platforms:
  amd64:
  arm64:

package-repositories:
  - type: apt
    formats: [deb-src]
    components: [main restricted universe multiverse]
    suites: [jammy, jammy-updates]
    key-id: F6ECB3762474EDA9D21B7022871920D1991BC93C
    url: http://archive.ubuntu.com/ubuntu
  - type: apt
    formats: [deb-src]
    components: [main restricted universe multiverse]
    suites: [jammy-security]
    key-id: F6ECB3762474EDA9D21B7022871920D1991BC93C
    url: http://security.ubuntu.com/ubuntu
  - type: apt
    formats: [deb, deb-src]
    components: [main]
    suites: [llvm-toolchain-jammy-18, llvm-toolchain-jammy-19]
    key-id: 6084F3CF814B57C1CF12EFD515CF4D18AF4F7421
    url: http://apt.llvm.org/jammy/

environment:
  HUBBLE_SERVER: "unix:///var/run/cilium/hubble.sock"
  INITSYSTEM: "SYSTEMD"

services:
  cilium:
    command: /usr/bin/cilium-dbg
    override: replace
    startup: enabled

parts:
  # https://github.com/cilium/proxy/blob/v1.36/Dockerfile.builder#L83-L87
  bazelisk:
    plugin: nil
    build-packages:
      - wget
    overlay-script: |
      wget https://github.com/bazelbuild/bazelisk/releases/download/v1.29.0/bazelisk-linux-$CRAFT_ARCH_BUILD_FOR
      mv bazelisk-linux-$CRAFT_ARCH_BUILD_FOR /usr/bin/bazelisk
      chmod +x /usr/bin/bazelisk
      ln -sf /usr/bin/bazelisk /usr/bin/bazel

  # https://github.com/cilium/proxy/blob/v1.36/Dockerfile#L17-L24
  cilium-envoy:
    after: [bazelisk]
    plugin: make
    source-type: git
    source: https://github.com/cilium/proxy.git
    source-tag: v1.36
    source-depth: 1
    build-packages:
      - autoconf
      - automake
      - cmake
      - coreutils
      - curl
      - git
      - libtool
      - make
      - ninja-build
      - patch
      - patchelf
      - python3
      - python-is-python3
      - unzip
      - virtualenv
      - wget
      - zip
      - libc6-dev
      - gcc
      - binutils
      - clang-18
      - clang-tools-18
      - lldb-18
      - lld-18
      - clang-format-18
      - libc++-18-dev
      - libc++abi-18-dev
      # cilium/proxy v1.36's custom Bazel C++ toolchain (//bazel/toolchains)
      # builds the whole tree against static libstdc++. Envoy 1.36's bundled
      # QUICHE uses `static constexpr std::vector` (C++20 P1004), which requires
      # libstdc++ >= 12; the jammy build-base only ships GCC 11. Upstream builds
      # on noble (GCC 13), so install g++-12 here and let clang-18 auto-select
      # the newest GCC for both headers and the static libstdc++.a link.
      - g++-12
    override-build: |
      export PKG_BUILD=1
      export DESTDIR=$CRAFT_PART_INSTALL
      export EMAIL=root@localhost
      # cilium/proxy v1.36 derives the LLVM prefix via `llvm-config --prefix`
      # (v1.34 hardcoded /usr/lib/llvm-17). The clang-18 apt packages install the
      # unversioned llvm-config under /usr/lib/llvm-18/bin, so put it on PATH.
      export PATH="/usr/lib/llvm-18/bin:$PATH"
      # Envoy's bazelrc sets `--incompatible_strict_action_env`, so Bazel's cc
      # autoconfig resolves the toolchain against a fixed PATH (/usr/local/bin:
      # /usr/bin:/bin) that excludes /usr/lib/llvm-18/bin, baking absolute tool
      # paths like /usr/bin/clang and /usr/bin/llvm-ar. The apt packages only
      # provide versioned /usr/bin/<tool>-18, so both compile actions and the
      # rules_foreign_cc host-tool builds (GNU Make: AR=/usr/bin/llvm-ar) fail
      # with "No such file or directory". Upstream v1.36's Dockerfile.builder
      # creates these unversioned symlinks itself; replicate that here since we
      # install via apt.
      for tool in clang clang++ clang-cpp lld ld.lld clang-format clang-tidy \
                  run-clang-tidy clang-apply-replacements llvm-ar llvm-nm \
                  llvm-strip llvm-objcopy llvm-objdump llvm-dwp llvm-cov llvm-config; do
        [ -x "/usr/lib/llvm-18/bin/$tool" ] && ln -sf /usr/lib/llvm-18/bin/$tool /usr/bin/$tool
      done
      git am --ignore-whitespace $CRAFT_PROJECT_DIR/envoy-fixes.patch

      make -C proxylib all
      mkdir -p $CRAFT_PART_INSTALL/usr/lib/
      cp proxylib/libcilium.so $CRAFT_PART_INSTALL/usr/lib/
      cp proxylib/libcilium.so /usr/lib/
      git rev-parse HEAD >SOURCE_VERSION
      make bazel-bin/cilium-envoy
      make install
      rm -rf /root/.cache/bazel

  builder-img-deps:
    plugin: nil
    build-packages:
      - unzip
      - binutils
      - coreutils
      - curl
      - gcc
      - git
      - libc6-dev
      - make
      - ccache

  build-deps:
    plugin: nil
    build-snaps:
      # https://github.com/cilium/cilium/blob/v1.19.4/images/builder/Dockerfile#L7
      - go/1.25-fips/stable
    build-packages:
      - autoconf
      - automake
      - autopoint
      - autotools-dev
      - build-essential
      - pkg-config
      # https://github.com/cilium/cilium/blob/v1.19.4/images/builder/install-protoc.sh
      - protobuf-compiler

  # https://github.com/cilium/cilium/blob/v1.19.4/images/builder/install-protoplugins.sh
  protoplugins:
    plugin: nil
    overlay-script: |
      # NOTE: (mateoflorido) Something is changing the requested version
      # in the build-snaps section.
      snap refresh go --channel 1.25-fips/stable

      go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
      go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
      go install github.com/mfridman/protoc-gen-go-json@v1.6.0
      go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@v1.5.1

  runtime-img-deps:
    plugin: nil
    stage-packages:
      - bash-completion
      - iproute2
      - ipset
      - kmod
      - ca-certificates

  iptables:
    plugin: nil
    stage-packages:
      - iptables

  # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/Dockerfile#L46-L47
  # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/iptables-wrapper-installer.sh
  iptables-wrapper:
    after: [iptables]
    plugin: nil
    source-type: file
    # NOTE: we maintain out own version of ./iptables-wrapper-installer.sh.
    source: ./iptables-wrapper-installer.sh
    build-environment:
    - OVERRIDE_PATH: "$CRAFT_PRIME/usr/sbin"
    - OVERRIDE_SBIN: "/usr/sbin"
    - OVERRIDE_ALTSTYLE: "none"
    override-prime: |
      craftctl default
      bash $CRAFT_PART_BUILD/iptables-wrapper-installer.sh --no-sanity-check

  # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/Dockerfile#L10
  # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/Dockerfile#L53
  # https://github.com/cilium/image-tools/blob/master/images/bpftool/Dockerfile#L12-L13
  bpftool:
    plugin: make
    source-type: git
    source: https://github.com/libbpf/bpftool.git
    source-tag: v7.7.0
    source-depth: 1
    source-subdir: src
    source-submodules:
      - "libbpf"
    build-packages:
      - xz-utils
      - libzstd-dev
      - zlib1g-dev
      - libelf-dev
      - libiberty-dev
      - libssl-dev
      - llvm-18
      - clang-18
      - clang-tools-18
      - lldb-18
      - lld-18
      - clang-format-18
      - libc++-18-dev
      - libc++abi-18-dev
    build-environment:
      - EXTRA_CFLAGS: --static
      - LLVM_CONFIG: "/usr/bin/llvm-config-18"
      - LLVM_STRIP: "/usr/bin/llvm-strip-18"
    override-build: |
      # libelf requires zstd on Ubuntu 24.04, this hasn't been addressed
      # in bpftool yet.
      sed -i 's/-lelf/-lelf -lzstd/g' src/Makefile

      make -C src -j "$(nproc)"
      strip src/bpftool

      mkdir -p $CRAFT_PART_INSTALL/usr/local/sbin/
      cp ./src/bpftool $CRAFT_PART_INSTALL/usr/local/sbin/
      chmod 755 $CRAFT_PART_INSTALL/usr/local/sbin/bpftool

  # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/Dockerfile#L20-L23
  gops:
    after: [build-deps]
    plugin: go
    source-type: git
    # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/build-gops.sh#L11-L12
    source: https://github.com/google/gops.git
    source-tag: v0.3.27
    source-depth: 1
    build-environment:
      - CGO_ENABLED: "1"
      - GOTOOLCHAIN: local
      - GOEXPERIMENT: opensslcrypto
      - GO_TAGS_FLAGS: "linux,cgo,ms_tls13kdf"
    override-build: |
      # NOTE: (mateoflorido) Something is changing the requested version
      # in the build-snaps section.
      snap refresh go --channel 1.25-fips/stable

      go install -ldflags "-s -w" ./...

  # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/Dockerfile#L24-L26
  # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/download-cni.sh#L13
  # https://github.com/cilium/cilium/blob/v1.19.4/images/runtime/cni-version.sh#L2
  cni-plugins:
    after: [build-deps]
    plugin: go
    source-type: git
    source: https://github.com/containernetworking/plugins.git
    source-tag: v1.9.1
    source-depth: 1
    build-environment:
      - CGO_ENABLED: "1"
      - GOTOOLCHAIN: local
      - GOEXPERIMENT: opensslcrypto
      - GO_TAGS_FLAGS: "linux,cgo,ms_tls13kdf"
    override-build: |
      # NOTE: (mateoflorido) Something is changing the requested version
      # in the build-snaps section.
      snap refresh go --channel 1.25-fips/stable

      ./build_linux.sh
      strip $CRAFT_PART_BUILD/bin/loopback
      cp -r $CRAFT_PART_BUILD/bin $CRAFT_PART_INSTALL
    stage:
      - -bin
    organize:
      bin/loopback: cni/loopback

  # https://github.com/cilium/cilium/blob/v1.19.4/images/cilium/Dockerfile#L45-L57
  hubble-completion:
    after: [build-deps]
    plugin: make
    source-type: git
    source: "https://github.com/cilium/hubble.git"
    # NOTE: Hubble has same release versioning scheme as Cilium itself.
    # The Hubble CLI is backward compatible with all supported Cilium releases.
    # For this reason, only the latest Hubble CLI version is maintained.
    source-tag: v1.19.4
    source-depth: 1
    build-environment:
      - CGO_ENABLED: "1"
      - GOTOOLCHAIN: local
      - GOEXPERIMENT: opensslcrypto
      - GO_TAGS: "linux,cgo,ms_tls13kdf"
    override-build: |
      # NOTE: (mateoflorido) Something is changing the requested version
      # in the build-snaps section.
      snap refresh go --channel 1.25-fips/stable

      # NOTE: Patch hubble's Makefile to use FIPS-compatible build flags.
      # The 1.25-fips Go toolchain's default crypto backend (opensslcrypto)
      # requires CGO_ENABLED=1; hubble's Makefile hardcodes CGO_ENABLED=0,
      # which fails with "Using a crypto backend requires CGO_ENABLED=1".
      find . -name "Makefile*" -exec sed -i 's/CGO_ENABLED=0/CGO_ENABLED=1/g' {} \;

      craftctl default
      mkdir -p $CRAFT_PART_INSTALL/etc/bash_completion.d
      $CRAFT_PART_INSTALL/usr/local/bin/hubble completion bash > $CRAFT_PART_INSTALL/etc/bash_completion.d/hubble

  # NOTE(Hue): Inspired from https://discourse.ubuntu.com/t/build-rocks-with-ubuntu-pro-services/57578
  openssl:
    plugin: nil
    stage-packages:
      - openssl-fips-module-3 # a Pro only FIPS package for openssl
      - openssl # now automatically selected from fips-preview

  zig:
    plugin: nil
    build-packages:
      - tar
      - curl
    override-build: |
      ARCH=x86_64
      if [ "$CRAFT_ARCH_BUILD_FOR" = "arm64" ]; then
        ARCH=aarch64
      fi

      curl -L https://ziglang.org/download/0.15.2/zig-$ARCH-linux-0.15.2.tar.xz -o zig.tar.xz
      mkdir -p /zig
      tar --strip-components 1 -xf zig.tar.xz -C /zig

      ln -sf /zig/zig /usr/bin/zig
  
  cilium:
    after: [build-deps, builder-img-deps, zig]
    plugin: make
    source-type: git
    source: https://github.com/cilium/cilium.git
    source-tag: v1.19.4
    build-packages:
      - clang-18
      - llvm-18
    build-environment:
     - DISABLE_ENVOY_INSTALLATION: "1"
     - CGO_ENABLED: "1"
     - GOTOOLCHAIN: local
     - GOEXPERIMENT: opensslcrypto
     - GO_TAGS_FLAGS: "linux,cgo,ms_tls13kdf"
     - GO_BUILD_LDFLAGS: "-linkmode external"
     - PKG_BUILD: "1"
     - NOSTRIP: "0"
     - NOOPT: "0"
    override-build: |
      export DESTDIR=$CRAFT_PART_INSTALL

      # NOTE: (mateoflorido) Something is changing the requested version
      # in the build-snaps section.
      snap refresh go --channel 1.25-fips/stable
      
      # NOTE (mateoflorido): Patch Cilium Makefiles to use FIPS-compatible build flags
      find . -name "Makefile*" -exec sed -i 's/CGO_ENABLED=0/CGO_ENABLED=1/g' {} \;

      # Note(Reza): The target must match the glibc version corresponding to the oldest supported host.
      CXX="zig c++ -target ${CRAFT_ARCH_TRIPLET_BUILD_FOR}.2.31" CC="zig cc -target ${CRAFT_ARCH_TRIPLET_BUILD_FOR}.2.31" make build-container

      make install-container-binary
      make install-bash-completion
      make licenses-all

      echo 'install_cni "/usr/bin/cilium-dbg"' >> $CRAFT_PART_BUILD/plugins/cilium-cni/install-plugin.sh

      cp $CRAFT_PART_BUILD/LICENSE.all  $CRAFT_PART_INSTALL/
      cp $CRAFT_PART_SRC/images/cilium/init-container.sh $CRAFT_PART_INSTALL/
      cp $CRAFT_PART_BUILD/plugins/cilium-cni/install-plugin.sh $CRAFT_PART_INSTALL/
      cp $CRAFT_PART_SRC/plugins/cilium-cni/cni-uninstall.sh $CRAFT_PART_INSTALL/

      find $CRAFT_PART_INSTALL -type f -executable -exec sh -c 'objcopy --strip-all ${0}' {} \;
    override-prime: |
      craftctl default
      rm -rf /root/.cache/go-build
  
  llvm:
    plugin: nil
    build-packages:
      # Required for `apt-get source`
      - dpkg-dev
    override-pull: |
      mkdir -p /tmp/llvm
      cd /tmp/llvm
      apt-get source -y llvm-toolchain-19
      cp -r llvm-toolchain-19-*/. $CRAFT_PART_SRC
    override-build: |
      apt-get build-dep -y llvm-toolchain-19

      mkdir -p llvm/build
      cd llvm/build

      cmake .. -G "Ninja" \
          -DLLVM_TARGETS_TO_BUILD="BPF" \
          -DLLVM_ENABLE_PROJECTS="clang" \
          -DBUILD_SHARED_LIBS="OFF" \
          -DCMAKE_CXX_FLAGS="-s -O2" \
          -DCMAKE_BUILD_TYPE="Release" \
          -DLLVM_BUILD_RUNTIME="OFF" \
          -DCMAKE_INSTALL_PREFIX="/usr/local"

      ninja clang llc llvm-objcopy llvm-strip

      strip bin/clang
      strip bin/llc
      strip bin/llvm-objcopy
      strip bin/llvm-strip

      mkdir -p $CRAFT_PART_INSTALL/usr/local/bin
      cp bin/clang bin/llc bin/llvm-objcopy bin/llvm-strip $CRAFT_PART_INSTALL/usr/local/bin/
